<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <title>Redirecting to www.apexld.edu.au</title>
  <link rel="canonical" href="https://www.apexld.edu.au/">
  <script>
    // Bounce the bare apex to www, preserving the path, query and hash so deep
    // links (e.g. apexld.edu.au/first-aid/) land on the matching www page.
    location.replace('https://www.apexld.edu.au' + location.pathname + location.search + location.hash);
  </script>
  <meta http-equiv="refresh" content="0; url=https://www.apexld.edu.au/">
</head>
<body>
  Redirecting to <a href="https://www.apexld.edu.au/">www.apexld.edu.au</a>&hellip;
</body>
</html>
